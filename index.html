<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <title>Spy Universal - UFJF Deep Audit</title>
   <script src="https://root.cern/js/latest/scripts/JSRoot.core.js" type="text/javascript"></script>
   
   <style>
      :root {
         --neon-green: #00ff00;
         --dark-bg: #0a0a0a;
         --card-bg: #161616;
         --text-gray: #b0b0b0;
         --ufjf-blue: #00bfff;
      }

      body { 
         font-family: 'Segoe UI', sans-serif; 
         background-color: var(--dark-bg); 
         color: white; padding: 20px; margin: 0;
      }

      .container { max-width: 1200px; margin: auto; }

      header {
         background: var(--card-bg);
         border: 1px solid #333;
         border-radius: 12px;
         padding: 30px;
         margin-bottom: 30px;
         box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .header-title {
         text-align: center;
         border-bottom: 2px solid var(--neon-green);
         padding-bottom: 15px;
         margin-bottom: 25px;
      }

      .header-title h1 { margin: 0; letter-spacing: 3px; font-size: 2em; }
      .header-title p { color: var(--ufjf-blue); font-weight: bold; margin-top: 5px; }

      .profile-grid {
         display: grid;
         grid-template-columns: 1fr 1fr 1fr;
         gap: 20px;
      }

      .card {
         background: #202020;
         padding: 20px;
         border-radius: 8px;
         border-top: 3px solid var(--neon-green);
         display: flex;
         flex-direction: column;
         justify-content: space-between;
      }

      .card h3 { margin-top: 0; color: var(--neon-green); font-size: 1.1em; height: 40px; }
      .card p { font-size: 0.85em; color: var(--text-gray); line-height: 1.4; margin-bottom: 15px; }

      .lattes-btn {
         display: inline-block;
         text-decoration: none;
         color: #000;
         background: var(--text-gray);
         padding: 5px 10px;
         border-radius: 4px;
         font-size: 0.75em;
         font-weight: bold;
         text-align: center;
         transition: 0.3s;
      }

      .lattes-btn:hover { background: #fff; }

      .main-app {
         background: var(--card-bg);
         padding: 25px;
         border-radius: 12px;
         border: 1px solid #333;
      }

      .controls { 
         display: flex; gap: 15px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;
      }

      input[type="file"] { 
         background: #252525; color: white; padding: 10px; border-radius: 5px; border: 1px solid #444; flex-grow: 1;
      }
      
      button { 
         background: var(--neon-green); color: black; border: none; padding: 12px 25px; 
         font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; text-transform: uppercase;
      }

      button:hover { background: #fff; transform: translateY(-2px); }
      button#btn-csv { background: var(--ufjf-blue); }

      #output { 
         background: #050505; border: 1px solid #222; padding: 20px; white-space: pre; overflow-x: auto; 
         font-family: 'Courier New', monospace; font-size: 12px; height: 550px; overflow-y: scroll; color: #00ff41;
      }

      .status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #555; margin-right: 8px; }
      .active { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
   </style>
</head>
<body>

<div class="container">
   <header>
      <div class="header-title">
         <h1>SPY ROOT UNIVERSAL</h1>
         <p>Universidade Federal de Juiz de Fora - UFJF</p>
      </div>

      <div class="profile-grid">
         <div class="card">
            <h3>👨‍🔬 Pesquisador & Desenvolvedor</h3>
            <p><strong>Nelson Cevidanes Nascimento de Assis</strong><br>Aluno UFJF responsável pela arquitetura de auditoria.</p>
            <a href="http://lattes.cnpq.br/1152265127430881" target="_blank" class="lattes-btn">Currículo Lattes</a>
         </div>

      </div>
   </header>

   <div class="main-app">
      <div class="controls">
         <input type="file" id="fileItem" accept=".root">
         <button id="btn-audit">Executar Auditoria Profunda</button>
         <button id="btn-csv">Exportar CSV</button>
      </div>

      <div style="margin-bottom: 10px; font-size: 0.85em;">
         <span id="status-light" class="status-light"></span>
         <span id="status-text" style="color: #888;">Pronto para análise.</span>
      </div>

      <div id="output">Selecione um arquivo .root para iniciar...</div>
   </div>
</div>

<script type="module">
   import { openFile } from 'https://root.cern/js/latest/modules/io.mjs';

   let auditData = [];
   let currentFileName = "auditoria";

   function downloadCSV() {
      if (auditData.length === 0) return;
      let csvContent = "data:text/csv;charset=utf-8,Tipo,Caminho,Info\n";
      auditData.forEach(row => { csvContent += `${row.type},"${row.name}","${row.info}"\n`; });
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `${currentFileName}_audit.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
   }

   // Função recursiva para "espiar" dentro das branches (Deep Inspection)
   function inspectBranches(branch, prefix, reportAcc) {
      const type = branch.fClassName || branch.fType || "Primitive";
      const isJagged = (type.includes("vector") || type.includes("[]")) ? " [JAGGED]" : "";
      
      const branchName = prefix === "" ? branch.fName : `${prefix}/${branch.fName}`;
      
      reportAcc.text += `  ${branchName.padEnd(60)} | ${type.padEnd(30)}${isJagged}\n`;
      auditData.push({type: "Branch", name: branchName, info: type + isJagged});

      // Se a branch tem sub-branches, entra nelas (comportamento do Uproot)
      if (branch.fBranches && branch.fBranches.arr) {
         branch.fBranches.arr.forEach(sub => {
            inspectBranches(sub, branchName, reportAcc);
         });
      }
   }

   async function runAudit() {
      const fileInput = document.getElementById('fileItem');
      const output = document.getElementById('output');
      const statusText = document.getElementById('status-text');
      const statusLight = document.getElementById('status-light');
      const file = fileInput.files[0];

      if (!file) { alert("Selecione um arquivo!"); return; }

      currentFileName = file.name.split('.')[0];
      auditData = []; 
      output.innerText = "⌛ Realizando Deep Scan (Mapeando sub-estruturas)...";
      statusLight.classList.add('active');
      statusText.innerText = "Lendo hierarquia binária...";

      try {
         const f = await openFile(file);
         let report = `INVESTIGANDO: ${file.name}\n${"=".repeat(100)}\n\n`;

         const keys = f.fKeys;
         
         // Varredura de Trees
         for (let key of keys) {
            if (key.fClassName === "TTree") {
               const tree = await f.readObject(key.fName);
               report += `> ÁRVORE: ${key.fName} (Eventos: ${tree.fEntries})\n`;
               report += `  ${"Branch".padEnd(62)} | ${"Tipo (Typename)".padEnd(30)}\n`;
               report += "-".repeat(100) + "\n";
               
               let reportAcc = { text: "" };
               if (tree.fBranches && tree.fBranches.arr) {
                  tree.fBranches.arr.forEach(br => inspectBranches(br, "", reportAcc));
               }
               report += reportAcc.text + "\n";
            }
         }

         // Varredura de Histogramas (Busca recursiva em pastas)
         async function scanHists(dir, path = "") {
            const keys = dir.fKeys || [];
            for (let key of keys) {
               const fullPath = path === "" ? key.fName : `${path}/${key.fName}`;
               if (key.fClassName.startsWith("TH")) {
                  report += `[HIST] ${fullPath.padEnd(55)} | ${key.fClassName}\n`;
                  auditData.push({type: "Histogram", name: fullPath, info: key.fClassName});
               } else if (key.fClassName.startsWith("TDirectory")) {
                  const subDir = await f.readDirectory(fullPath);
                  await scanHists(subDir, fullPath);
               }
            }
         }

         report += `--- [ ESTRUTURA DE HISTOGRAMAS ] ---\n`;
         await scanHists(f);

         report += "\n" + "=".repeat(100) + "\nAUDITORIA CONCLUÍDA.";
         output.innerText = report;
         statusText.innerText = "Concluído.";
         statusLight.classList.remove('active');

      } catch (err) {
         output.innerText = "ERRO: " + err.message;
         statusLight.classList.remove('active');
      }
   }

   document.getElementById('btn-audit').onclick = runAudit;
   document.getElementById('btn-csv').onclick = downloadCSV;
</script>

</body>
</html>
