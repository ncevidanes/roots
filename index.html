<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spy Universal - Auditor ROOT</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { font-family: 'Courier New', monospace; background-color: #1a1a1a; color: #00ff00; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 8px; background: #000; }
        h1 { color: #fff; text-align: center; border-bottom: 2px solid #00ff00; }
        
        .controls { display: flex; gap: 10px; margin-top: 20px; align-items: center; }
        input[type="file"] { background: #333; color: white; padding: 10px; flex-grow: 1; }
        
        button { 
            background: #00ff00; color: black; border: none; padding: 12px 20px; 
            font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        button:hover { background: #00cc00; }
        button:disabled { background: #555; cursor: not-allowed; }

        #output { 
            white-space: pre; overflow-x: auto; margin-top: 20px; 
            border: 1px dashed #444; padding: 15px; background: #050505; min-height: 100px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1> SPY UNIVERSAL </h1>
    <p style="text-align: center; color: #888;">Auditoria de arquivos ROOT via Navegador</p>
    
    <div class="controls">
        <input type="file" id="file-upload" accept=".root">
        <button id="run-btn" py-click="process_file">EXECUTAR AUDITORIA</button>
    </div>
    
    <div id="output">Aguardando seleção de arquivo e clique no botão...</div>
</div>

<py-config>
    packages = ["uproot", "numpy"]
</py-config>

<script type="py">
from js import document, Uint8Array
import uproot
import io

async def process_file(event):
    output_div = document.getElementById("output")
    file_input = document.getElementById("file-upload")
    
    if not file_input.files.item(0):
        output_div.innerText = "[AVISO] Por favor, selecione um arquivo .root primeiro!"
        return

    output_div.innerHTML = "<b style='color: yellow;'>⌛ Lendo arquivo e processando TTrees...</b>"
    
    try:
        file = file_input.files.item(0)
        array_buffer = await file.arrayBuffer()
        uint8_array = Uint8Array.new(array_buffer)
        bytes_io = io.BytesIO(uint8_array.to_bytes())
        
        with uproot.open(bytes_io) as root_file:
            report = [
                "="*80,
                f"AUDITORIA EXECUTADA EM: {file.name}",
                "="*80 + "\n"
            ]

            objs = root_file.classnames()
            trees = [n for n, c in objs.items() if c == "TTree"]
            hists = [n for n, c in objs.items() if "TH" in c]

            if trees:
                report.append(f"--- [ENCONTRADAS {len(trees)} TTREES] ---")
                for nome in trees:
                    t = root_file[nome.split(';')[0]]
                    report.append(f"\n> ÁRVORE: {nome} | Eventos: {t.num_entries}")
                    report.append(f"  {'Branch':<40} | {'Tipo':<20}")
                    report.append("-" * 65)
                    # Limitando a exibição para não travar o navegador se tiver 1000 branches
                    for i, (b_name, branch) in enumerate(t.items()):
                        if i > 50: 
                            report.append("  (...) e mais branches abaixo.")
                            break
                        report.append(f"  {b_name[:39]:<40} | {str(branch.typename)[:20]}")
            
            if hists:
                report.append(f"\n--- [ENCONTRADOS {len(hists)} HISTOGRAMAS] ---")
                for h in hists:
                    report.append(f"  [HIST] {h}")

            report.append("\n" + "="*80)
            report.append("FIM DA INVESTIGAÇÃO.")
            output_div.innerText = "\n".join(report)

    except Exception as e:
        output_div.innerHTML = f"<b style='color: red;'>[ERRO CRÍTICO]</b>\n{str(e)}"

</script>

</body>
</html>
