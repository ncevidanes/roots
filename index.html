<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <title>Spy Universal JS - Full Audit</title>
   <script src="https://root.cern/js/latest/scripts/JSRoot.core.js" type="text/javascript"></script>
   <style>
      body { font-family: 'Courier New', monospace; background-color: #0a0a0a; color: #00ff00; padding: 20px; }
      .container { max-width: 1100px; margin: auto; border: 1px solid #00ff00; padding: 20px; background: #000; }
      h1 { text-align: center; color: #fff; border-bottom: 2px solid #00ff00; }
      #output { background: #050505; border: 1px solid #333; padding: 20px; white-space: pre; overflow-x: auto; font-size: 12px; height: 600px; overflow-y: scroll; }
      .controls { margin-bottom: 20px; background: #1a1a1a; padding: 15px; }
   </style>
</head>
<body>

<div class="container">
   <h1> SPY UNIVERSAL (JSROOT FULL)</h1>
   <div class="controls">
      <input type="file" id="fileItem" accept=".root">
   </div>
   <div id="output">Selecione o arquivo .root...</div>
</div>

<script type="module">
   import { openFile } from 'https://root.cern/js/latest/modules/io.mjs';

   document.getElementById('fileItem').onchange = function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const output = document.getElementById('output');
      output.innerText = "⌛ Mapeando estrutura completa... aguarde.";

      openFile(file).then(async (f) => {
         let report = `INVESTIGANDO: ${file.name}\n${"=".repeat(80)}\n\n`;

         // Função para extrair branches recursivamente
         function getBranches(obj, indent = "  ") {
            let res = "";
            if (obj && obj.fBranches && obj.fBranches.arr) {
               obj.fBranches.arr.forEach(br => {
                  res += `${indent}${br.fName.padEnd(50)} | ${br.fClassName || "Primitive"}\n`;
                  // Tenta descer um nível se houver sub-branches
                  if (br.fBranches) res += getBranches(br, indent + "  ");
               });
            }
            return res;
         }

         // Scan de Árvores
         const keys = f.fKeys;
         for (let key of keys) {
            if (key.fClassName === "TTree") {
               const tree = await f.readObject(key.fName);
               report += `> ÁRVORE: ${key.fName} (Eventos: ${tree.fEntries})\n`;
               report += `${"  Branch".padEnd(52)} | Tipo\n${"-".repeat(80)}\n`;
               report += getBranches(tree);
               report += "\n";
            }
         }

         // Scan de Histogramas (Busca profunda em diretórios)
         report += `--- [ ENCONTRADOS HISTOGRAMAS ] ---\n`;
         let histCount = 0;
         
         // O JSROOT armazena histogramas em keys, mas eles podem estar em pastas
         keys.forEach(key => {
            if (key.fClassName.startsWith("TH")) {
               histCount++;
               report += `[HIST] ${key.fName.padEnd(50)} | ${key.fClassName}\n`;
            }
         });

         report += `\nTotal de histogramas na raiz: ${histCount}\n`;
         report += "\n" + "=".repeat(80) + "\nAUDITORIA CONCLUÍDA.";
         output.innerText = report;
      });
   };
</script>
</body>
</html>
